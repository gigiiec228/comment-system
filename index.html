<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes with Google Sheet Sync</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
      form, .note { margin-bottom: 1rem; }
      input, textarea { display: block; width: 100%; margin: 0.3rem 0; }
      button { margin-right: 0.5rem; }
      .tags { color: #555; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // ===================== 設定 =====================
      const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDQrND4u-fzPr5SmTgRvVPwioZ9w95F6xnmgvbakbmiXJY-4pvP5wHBAIslp6t4x8v6g/exec";
      const STORAGE_KEY = "notes";

      // ===================== 工具函數 =====================
      function generateId() {
        return Date.now() + "_" + Math.random().toString(36).slice(2, 6);
      }

      // ===================== localStorage 讀寫 =====================
      function loadFromStorage() {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      }

      function saveToStorage(records) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      }

      // ===================== 同步到 Google Sheet =====================
      async function syncToSheet(payload) {
        if (APPS_SCRIPT_URL === "PASTE_YOUR_APPS_SCRIPT_URL_HERE") {
          console.warn("尚未設定 APPS_SCRIPT_URL，跳過同步");
          return;
        }
        try {
          const res = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const data = await res.json();
          console.log("同步成功", data);
        } catch (err) {
          console.warn("同步失敗（不影響本機操作）", err);
        }
      }

      // ===================== 應用狀態 =====================
      let records = loadFromStorage();
      let editId = null; // 目前編輯中的 id

      // ===================== DOM 元素 =====================
      const root = document.getElementById("root");

      function render() {
        root.innerHTML = "";

        // 表單區域
        const form = document.createElement("form");
        form.id = "note-form";

        const titleInput = document.createElement("input");
        titleInput.type = "text";
        titleInput.placeholder = "標題";
        titleInput.id = "title-input";
        titleInput.required = true;

        const contentInput = document.createElement("textarea");
        contentInput.placeholder = "內容";
        contentInput.id = "content-input";
        contentInput.rows = 3;

        const tagsInput = document.createElement("input");
        tagsInput.type = "text";
        tagsInput.placeholder = "標籤（用逗號分隔）";
        tagsInput.id = "tags-input";

        const submitBtn = document.createElement("button");
        submitBtn.type = "submit";
        submitBtn.textContent = editId ? "更新" : "新增";

        const cancelBtn = document.createElement("button");
        cancelBtn.type = "button";
        cancelBtn.textContent = "取消編輯";
        cancelBtn.style.display = editId ? "inline-block" : "none";
        cancelBtn.onclick = () => {
          editId = null;
          document.getElementById("note-form").reset();
          render();
        };

        form.append(titleInput, contentInput, tagsInput, submitBtn, cancelBtn);

        form.onsubmit = (e) => {
          e.preventDefault();
          const title = titleInput.value.trim();
          if (!title) return;

          const tags = tagsInput.value
            .split(",")
            .map(t => t.trim())
            .filter(t => t !== "");

          if (editId) {
            // 修改
            const index = records.findIndex(r => r.id === editId);
            if (index !== -1) {
              const changes = { title, content: contentInput.value, tags };
              Object.assign(records[index], changes);
              saveToStorage(records);
              syncToSheet({ action: "update", id: editId, changes });
            }
            editId = null;
          } else {
            // 新增
            const newRecord = {
              id: generateId(),
              title,
              content: contentInput.value,
              tags,
              createdAt: new Date().toISOString()
            };
            records.push(newRecord);
            saveToStorage(records);
            syncToSheet({ action: "create", record: newRecord });
          }
          form.reset();
          render();
        };

        root.appendChild(form);

        // 記錄列表
        const list = document.createElement("div");
        list.id = "notes-list";

        if (records.length === 0) {
          list.innerHTML = "<p>尚無紀錄</p>";
        } else {
          records.forEach(r => {
            const div = document.createElement("div");
            div.className = "note";
            div.innerHTML = `
              <strong>${escapeHtml(r.title)}</strong>
              <p>${escapeHtml(r.content)}</p>
              <div class="tags">標籤：${escapeHtml(r.tags.join(", "))}</div>
              <small>${new Date(r.createdAt).toLocaleString()}</small>
            `;

            const editBtn = document.createElement("button");
            editBtn.textContent = "編輯";
            editBtn.onclick = () => {
              editId = r.id;
              document.getElementById("title-input").value = r.title;
              document.getElementById("content-input").value = r.content;
              document.getElementById("tags-input").value = r.tags.join(", ");
              render();
            };

            const deleteBtn = document.createElement("button");
            deleteBtn.textContent = "刪除";
            deleteBtn.onclick = () => {
              if (confirm("確定要刪除嗎？")) {
                records = records.filter(item => item.id !== r.id);
                saveToStorage(records);
                syncToSheet({ action: "delete", id: r.id });
                render();
              }
            };

            div.appendChild(editBtn);
            div.appendChild(deleteBtn);
            list.appendChild(div);
          });
        }
        root.appendChild(list);
      }

      function escapeHtml(text) {
        const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
        return String(text).replace(/[&<>"']/g, m => map[m]);
      }

      // 初始渲染
      render();

      // 如果想要初次載入時從 Sheet 匯入資料（可選），可自行實作：
      // async function loadFromSheet() { ... }
    </script>
  </body>
</html>
