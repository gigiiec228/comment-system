<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園美食大搜查 - Bento Edition</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bento-bg: #FFF9F2;
            --bento-pink: #FFD1DC;
            --bento-yellow: #FFF2CC;
            --bento-green: #D4EDDA;
            --bento-dark: #5D4037;
            --bento-primary: #FFAB91;
            --bento-blue: #E1F5FE;
        }

        body {
            background-color: var(--bento-bg);
            color: var(--bento-dark);
            font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
        }

        .bento-card {
            background: white;
            border: 3px solid var(--bento-dark);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 6px 6px 0px var(--bento-dark);
            transition: all 0.2s ease;
        }

        .bento-button {
            background: var(--bento-primary);
            border: 2px solid var(--bento-dark);
            border-radius: 16px;
            font-weight: 800;
            box-shadow: 4px 4px 0px var(--bento-dark);
            transition: all 0.1s;
            cursor: pointer;
        }

        .bento-button:active {
            box-shadow: 0px 0px 0px var(--bento-dark);
            transform: translate(4px, 4px);
        }

        .bento-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 隱藏捲軸但保持滾動 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .status-done { opacity: 0.6; }
        .status-done h3 { text-decoration: line-through; opacity: 0.7; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-[1200px] mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="bg-bento-pink w-12 h-12 rounded-xl flex items-center justify-center border-2 border-bento-dark shadow-[3px_3px_0px_#5D4037]">
                    <i data-lucide="utensils-crossed" style="color: #5D4037"></i>
                </div>
                <h1 class="text-3xl font-[900] tracking-tight">校園美食大搜查</h1>
            </div>
            <!-- 右側：原有文字 + AI 摘要按鈕 -->
            <div class="flex flex-col items-end">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-bold">👋 你好，美食家！</p>
                    <p class="text-[10px] opacity-40 uppercase font-black">Local Storage + Google Sheet 雙重同步</p>
                </div>
                <button onclick="handleAISummary()" id="aiBtn" class="mt-2 bento-button px-3 py-1 text-sm bg-white flex items-center gap-1">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                    <span id="aiBtnText">AI 摘要</span>
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Left Column: Submit Form -->
            <div class="md:row-span-2">
                <section class="bento-card bg-[#FFF2CC] h-full">
                    <h2 class="text-2xl font-black mb-6 flex items-center gap-2">
                        <span>✍️</span> 我要評價
                    </h2>
                    <form id="reviewForm" class="space-y-4">
                        <div class="space-y-2">
                            <label class="text-sm font-bold block">食物名稱</label>
                            <input type="text" id="foodName" required placeholder="例如：阿姨乾麵" class="w-full p-3 border-2 border-[#5D4037] rounded-xl outline-none focus:ring-2 ring-[#FFAB91]">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold block">餐廳/地點</label>
                            <input type="text" id="restaurantName" required placeholder="例如：學一舍地下室" class="w-full p-3 border-2 border-[#5D4037] rounded-xl outline-none focus:ring-2 ring-[#FFAB91]">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold block">星星評分 (1-5)</label>
                            <div class="flex gap-2" id="starContainer">
                                <!-- Stars generated by JS -->
                            </div>
                            <input type="hidden" id="ratingValue" value="5">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold block">心得評論</label>
                            <textarea id="comment" placeholder="分享你的真實感受..." class="w-full p-3 border-2 border-[#5D4037] rounded-xl outline-none focus:ring-2 ring-[#FFAB91] h-32 resize-none"></textarea>
                        </div>
                        <button type="submit" class="w-full bento-button py-4 text-lg mt-4">
                            ✅ 提交我的評分
                        </button>
                    </form>
                </section>
            </div>

            <!-- Middle Column: Leaderboard -->
            <div>
                <section class="bento-card bg-[#FFD1DC] h-full" id="leaderboardSection">
                    <h2 class="text-xl font-black mb-6 flex items-center gap-2">
                        <span>🏆</span> 本週排行榜
                    </h2>
                    <div id="leaderboardList" class="space-y-4">
                        <!-- Rankings generated by JS -->
                    </div>
                </section>
            </div>

            <!-- Right Column: Stats -->
            <div class="bento-card bg-[#E1F5FE] flex flex-col items-center justify-center text-center">
                <p class="text-sm font-bold opacity-70 mb-1">已累計收錄評價</p>
                <p class="text-6xl font-black" id="totalCount">0</p>
                <p class="text-sm font-bold opacity-70 mt-1">條真實回饋</p>
            </div>

            <!-- Bottom Row: Recent Feed -->
            <div class="md:col-span-2 bento-card bg-[#D4EDDA]">
                <div class="flex items-center gap-2 mb-6">
                    <i data-lucide="clock" class="w-6 h-6"></i>
                    <h2 class="text-xl font-black">🕒 最新食評動態</h2>
                </div>
                <div id="feedContainer" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide min-h-[150px]">
                    <!-- Review cards generated by JS -->
                </div>
            </div>
        </main>

        <footer class="mt-12 text-center opacity-40 font-bold text-sm">
            <p>🍱 Campus Foodies • Static HTML + Google Sheet • 2024</p>
        </footer>
    </div>

    <!-- JavaScript 邏輯 -->
    <script>
        // ==================== 設定區 ====================
        // 🔻 請將下方 URL 替換為你部署 Google Apps Script 後獲得的 Web App 網址
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOztS-0IzrjYKtuTSkWCGQ69yn2RMsTK8Bmru3nKrjOcuPbMN3z5F8G_96FtSmMfZJ/exec";

        // ==================== Google Sheet 同步 Helper ====================
        async function syncToSheet(payload) {
            if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === "https://script.google.com/macros/s/AKfycbyOztS-0IzrjYKtuTSkWCGQ69yn2RMsTK8Bmru3nKrjOcuPbMN3z5F8G_96FtSmMfZJ/exec") {
                console.warn("尚未設定 APPS_SCRIPT_URL，跳過同步至 Google Sheet");
                return;
            }
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.status !== "created" && result.status !== "updated" && result.status !== "deleted") {
                    console.warn("Google Sheet 同步回應異常:", result);
                }
            } catch (err) {
                console.warn("同步至 Google Sheet 失敗 (不影響本機操作):", err);
            }
        }

        // 從 Google Sheet 拉取所有資料，並覆蓋 localStorage (做為初始同步)
        async function fetchFromSheetAndSyncLocal() {
            if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === "PASTE_YOUR_APPS_SCRIPT_URL_HERE") {
                console.log("未設定 Google Sheet URL，僅使用 localStorage");
                return false;
            }
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const data = await response.json();
                if (data.records && Array.isArray(data.records)) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data.records));
                    return true;
                }
                return false;
            } catch (err) {
                console.warn("從 Google Sheet 拉取資料失敗，繼續使用 localStorage:", err);
                return false;
            }
        }

        // 初始化 Lucide 圖標
        lucide.createIcons();

        // 狀態管理
        let currentRating = 5;
        const STORAGE_KEY = "records";

        // === 功能型 Function (保留原樣，無需更動核心邏輯) ===

        // 1. 載入資料
        function loadData() {
            const rawData = localStorage.getItem(STORAGE_KEY);
            return rawData ? JSON.parse(rawData) : [];
        }

        // 2. 儲存資料 (僅本機)
        function saveData(newRecord) {
            const records = loadData();
            records.unshift(newRecord);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            renderList();
        }

        // 3. 渲染列表與功能
        function renderList() {
            const records = loadData();
            
            // 更新總計
            document.getElementById('totalCount').textContent = records.length;

            // --- 渲染食評列表 ---
            const feedContainer = document.getElementById('feedContainer');
            
            // 排序規則：active 排上面，done 排下面
            const sortedRecords = [...records].sort((a, b) => {
                if (a.status === b.status) return 0;
                return a.status === 'active' ? -1 : 1;
            });

            if (sortedRecords.length === 0) {
                feedContainer.innerHTML = `<div class='w-full py-10 text-center opacity-40 italic'>暫無數據，快來提交第一個食評吧！</div>`;
            } else {
                feedContainer.innerHTML = sortedRecords.map(record => `
                    <div class="min-w-[280px] bento-card p-4 relative transition-all ${record.status === 'done' ? 'status-done' : ''}">
                        ${record.status === 'done' ? `
                            <div class="absolute top-2 right-2 bg-[#D4EDDA] border border-[#5D4037] px-2 py-0.5 rounded-full flex items-center gap-1 shadow-[2px_2px_0px_#5D4037] z-10">
                                <i data-lucide="check-circle-2" class="w-3 h-3"></i>
                                <span class="text-[10px] font-black">已處理</span>
                            </div>
                        ` : ''}
                        
                        <div class="flex flex-col mb-2">
                            <span class="text-xs font-bold text-yellow-600 mb-1">${'⭐'.repeat(record.rating)}</span>
                            <h3 class="font-black text-lg leading-tight uppercase">${escapeHtml(record.foodName)}</h3>
                            <p class="text-[10px] opacity-60 font-bold">${escapeHtml(record.restaurantName)}</p>
                        </div>

                        <p class="text-sm text-gray-600 mt-2 line-clamp-2 italic h-[40px]">
                            "${escapeHtml(record.comment || '無評論內容')}"
                        </p>

                        <div class="mt-4">
                            <button onclick="toggleStatus('${record.id}')" class="bento-button px-3 py-1 text-[10px] bg-white flex items-center gap-1">
                                ${record.status === 'active' ? '標記為已讀' : '恢復為待處理'}
                            </button>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            }

            // --- 渲染排行榜 ---
            renderLeaderboard(records);
        }

        // 簡單防 XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // 輔助功能：切換狀態 (修改同步)
        window.toggleStatus = async function(id) {
            let records = loadData();
            let updatedRecord = null;
            let newStatus = null;
            records = records.map(r => {
                if (r.id === id) {
                    newStatus = r.status === 'active' ? 'done' : 'active';
                    updatedRecord = { ...r, status: newStatus };
                    return updatedRecord;
                }
                return r;
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            renderList();
            // 同步至 Google Sheet
            await syncToSheet({ action: "update", id: id, changes: { status: newStatus } });
        };

        // 輔助功能：計算排行榜
        function renderLeaderboard(records) {
            const stats = {};
            records.forEach(r => {
                const key = `${r.foodName} (${r.restaurantName})`;
                if (!stats[key]) stats[key] = { total: 0, count: 0, loc: r.restaurantName, name: r.foodName };
                stats[key].total += r.rating;
                stats[key].count += 1;
            });

            const ranking = Object.values(stats)
                .map(s => ({ ...s, avg: s.total / s.count }))
                .sort((a, b) => b.avg - a.avg || b.count - a.count)
                .slice(0, 3);

            const listEl = document.getElementById('leaderboardList');
            if (ranking.length === 0) {
                listEl.innerHTML = `<div class="py-10 text-center opacity-40 italic text-sm">暫無排行榜數據</div>`;
            } else {
                listEl.innerHTML = ranking.map((item, idx) => `
                    <div class="flex items-center gap-3 pb-3 border-b border-dashed border-[#5D4037]/20 last:border-0">
                        <div class="w-8 h-8 bg-[#5D4037] text-white rounded-full flex items-center justify-center font-bold text-sm shrink-0">
                            ${idx + 1}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="font-black truncate text-sm">${escapeHtml(item.name)}</div>
                            <div class="text-[10px] opacity-60 truncate">${escapeHtml(item.loc)}</div>
                        </div>
                        <div class="font-black text-sm whitespace-nowrap">
                            ${item.avg.toFixed(1)} ⭐
                        </div>
                    </div>
                `).join('');
            }
        }

        // 輔助功能：星星選擇器
        function setupStars() {
            const container = document.getElementById('starContainer');
            container.innerHTML = [1, 2, 3, 4, 5].map(i => `
                <button type="button" onclick="setStar(${i})" class="star-btn transition-transform hover:scale-120" id="star-${i}">
                    <i data-lucide="star" class="w-8 h-8 ${i <= 5 ? 'fill-yellow-400 text-[#5D4037]' : 'text-gray-300'}"></i>
                </button>
            `).join('');
            lucide.createIcons();
        }

        window.setStar = function(val) {
            currentRating = val;
            document.getElementById('ratingValue').value = val;
            for (let i = 1; i <= 5; i++) {
                const btn = document.getElementById(`star-${i}`);
                const icon = btn.querySelector('svg');
                if (i <= val) {
                    icon.classList.add('fill-yellow-400', 'text-[#5D4037]');
                    icon.classList.remove('text-gray-300');
                } else {
                    icon.classList.remove('fill-yellow-400', 'text-[#5D4037]');
                    icon.classList.add('text-gray-300');
                }
            }
        };

        // --- 表單提交處理 (新增 + 同步) ---
        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newRecord = {
                id: Date.now() + "_" + Math.random().toString(36).slice(2, 6),
                createdAt: new Date().toISOString(),
                foodName: document.getElementById('foodName').value,
                restaurantName: document.getElementById('restaurantName').value,
                rating: parseInt(document.getElementById('ratingValue').value),
                comment: document.getElementById('comment').value,
                status: "active"
            };

            // 先儲存至本機 (保持原有 UX)
            saveData(newRecord);
            
            // 非同步同步至 Google Sheet (不阻塞 UI)
            syncToSheet({ action: "create", record: newRecord });
            
            // 重置表單
            e.target.reset();
            setStar(5);
        });

        // ========== AI 摘要相關功能 ==========
        async function askAI(userPrompt) {
            const res = await fetch(APPS_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "askAI", prompt: userPrompt })
            });
            const data = await res.json();
            return data.result || data.error || "AI 暫時沒有回應";
        }

        async function handleAISummary() {
            const btn = document.getElementById('aiBtn');
            const text = document.getElementById('aiBtnText');
            if (!btn || !text) return;
            btn.disabled = true;
            text.textContent = '思考中...';
            try {
                const records = loadData(); // 直接讀取本機資料
                if (records.length === 0) {
                    alert('還沒有任何美食資料，無法摘要');
                    return;
                }
                const summaryInput = records.slice(0, 30).map(r =>
                    `[${r.foodName}] @${r.restaurantName} (${'⭐'.repeat(r.rating)}) - ${r.comment || '無評論'}`
                ).join('\n');
                const prompt = `你是一個熱愛校園美食的顧問。以下是校園美食大搜查中大家分享的美食紀錄。請用繁體中文，活潑熱情地總結 3-5 個重點觀察（例如最受歡迎的食物、常見的搭配、有趣的趨勢），並推薦一個你最想嘗試的單品或組合。\n\n${summaryInput}`;
                const result = await askAI(prompt);
                alert(result);
            } catch (e) {
                alert('AI 摘要失敗：' + e.message);
            } finally {
                btn.disabled = false;
                text.textContent = 'AI 摘要';
            }
        }

        // ========== 初始化流程：先從 Google Sheet 拉取，再啟動畫面 ==========
        async function init() {
            await fetchFromSheetAndSyncLocal();   // 嘗試從雲端取得最新資料並更新 localStorage
            setupStars();                         // 建立星星元件
            renderList();                         // 渲染畫面 (此時會讀取已更新的 localStorage)
        }

        init();
    </script>
</body>
</html>
