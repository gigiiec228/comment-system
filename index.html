<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校園美食大搜查 - AI 摘要版</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bento-bg: #FFF9F2;
      --bento-pink: #FFD1DC;
      --bento-yellow: #FFF2CC;
      --bento-green: #D4EDDA;
      --bento-dark: #5D4037;
      --bento-primary: #FFAB91;
      --bento-blue: #E1F5FE;
    }
    body {
      background-color: var(--bento-bg);
      color: var(--bento-dark);
      font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
    }
    .bento-card { background: white; border: 3px solid var(--bento-dark); border-radius: 32px; padding: 24px; box-shadow: 6px 6px 0px var(--bento-dark); transition: all 0.2s ease; }
    .bento-button { background: var(--bento-primary); border: 2px solid var(--bento-dark); border-radius: 16px; font-weight: 800; box-shadow: 4px 4px 0px var(--bento-dark); transition: all 0.1s; cursor: pointer; }
    .bento-button:active { box-shadow: 0px 0px 0px var(--bento-dark); transform: translate(4px, 4px); }
    .bento-button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status-done { opacity: 0.6; }
    .status-done h3 { text-decoration: line-through; opacity: 0.7; }
    .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5); }
    .modal-content { background-color: #FFF9F2; margin: 10% auto; padding: 2rem; border: 3px solid #5D4037; border-radius: 32px; width: 90%; max-width: 500px; box-shadow: 8px 8px 0px #5D4037; }
    .close { color: #5D4037; float: right; font-size: 2rem; font-weight: bold; cursor: pointer; }
    .close:hover { color: #FFAB91; }
  </style>
</head>
<body class="p-4 md:p-8">
  <div class="max-w-[1200px] mx-auto">
    <!-- Header -->
    <header class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-4">
        <div class="bg-bento-pink w-12 h-12 rounded-xl flex items-center justify-center border-2 border-bento-dark shadow-[3px_3px_0px_#5D4037]">
          <i data-lucide="utensils-crossed" style="color: #5D4037"></i>
        </div>
        <h1 class="text-3xl font-[900] tracking-tight">校園美食大搜查</h1>
      </div>
      <div class="flex items-center gap-3">
        <!-- AI 摘要按鈕 -->
        <button onclick="handleAISummary()" id="aiBtn" class="flex items-center gap-2 bg-zinc-800 text-zinc-100 px-4 py-2 rounded-full font-medium hover:bg-zinc-700 transition-colors active:scale-95 border border-zinc-700 disabled:opacity-50">
          <i data-lucide="sparkles" class="w-4 h-4"></i>
          <span id="aiBtnText">AI 摘要</span>
        </button>
        <!-- 更改為「我要分享」取代「我要吐槽」 -->
        <button onclick="openModal()" class="bento-button px-5 py-2 flex items-center gap-2">
          <i data-lucide="plus-circle" class="w-5 h-5"></i>
          我要分享
        </button>
      </div>
    </header>

    <!-- 分類過濾按鈕列 -->
    <div class="flex flex-wrap gap-2 mb-6" id="filterBar">
      <button onclick="setFilter('全部')" class="bento-button px-4 py-1 text-sm bg-white" data-category="全部">全部</button>
      <button onclick="setFilter('飲料')" class="bento-button px-4 py-1 text-sm bg-white" data-category="飲料">飲料</button>
      <button onclick="setFilter('主食')" class="bento-button px-4 py-1 text-sm bg-white" data-category="主食">主食</button>
      <button onclick="setFilter('甜點')" class="bento-button px-4 py-1 text-sm bg-white" data-category="甜點">甜點</button>
      <button onclick="setFilter('其他')" class="bento-button px-4 py-1 text-sm bg-white" data-category="其他">其他</button>
    </div>

    <!-- 卡片列表容器 -->
    <main id="cardContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- 動態產生卡片 -->
    </main>

    <!-- Modal 分享表單（原「吐槽」改為「分享美食」） -->
    <div id="reviewModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 class="text-2xl font-black mb-4">✍️ 分享美食</h2>
        <form id="reviewForm" class="space-y-4">
          <div>
            <label class="text-sm font-bold block">食物名稱</label>
            <input type="text" id="foodName" required placeholder="例如：阿姨乾麵" class="w-full p-3 border-2 border-[#5D4037] rounded-xl outline-none">
          </div>
          <div>
            <label class="text-sm font-bold block">類別</label>
            <select id="foodCategory" class="w-full p-3 border-2 border-[#5D4037] rounded-xl outline-none">
              <option value="飲料">飲料</option>
              <option value="主食">主食</option>
              <option value="甜點">甜點</option>
              <option value="其他" selected>其他</option>
            </select>
          </div>
          <div>
            <label class="text-sm font-bold block">心得</label>
            <textarea id="foodComment" placeholder="分享你的真實感受..." class="w-full p-3 border-2 border-[#5D4037] rounded-xl outline-none h-32 resize-none"></textarea>
          </div>
          <button type="submit" class="w-full bento-button py-3 text-lg">✅ 送出</button>
        </form>
      </div>
    </div>

    <footer class="mt-12 text-center opacity-40 font-bold text-sm">
      <p>🍱 Campus Foodies • AI 摘要版 • 2024</p>
    </footer>
  </div>

  <script>
    // ==================== 設定區 ====================
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuP1LQ-DhkoKyfHuB7WOuYrRQDG77APsa9yFghXurU9PGCcD7dV4U0Kbge0BGag8Y/exec";
    let currentFilter = '全部';

    // ==================== 欄位正規化 ====================
    function normalizeRecord(record) {
      return {
        id: record.id || record.ID || "",
        createdAt: record.createdAt || record.CreatedAt || "",
        content: record.content || record.Content || "",
        category: record.category || record.Category || "其他",
        likes: Number(record.likes !== undefined ? record.likes : (record.Likes || 0)),
        status: record.status || record.Status || "active"
      };
    }

    // ==================== 從 Sheet 取得資料（GET） ====================
    async function fetchRecordsFromSheet() {
      if (APPS_SCRIPT_URL.includes("PASTE")) return null;
      try {
        const res = await fetch(APPS_SCRIPT_URL);
        const data = await res.json();
        return Array.isArray(data.records) ? data.records.map(normalizeRecord) : null;
      } catch (e) {
        console.warn("從 Sheet 讀取失敗", e);
        return null;
      }
    }

    // ==================== 同步至 Sheet (POST) ====================
    async function syncToSheet(payload) {
      if (APPS_SCRIPT_URL.includes("https://script.google.com/macros/s/AKfycbyOztS-0IzrjYKtuTSkWCGQ69yn2RMsTK8Bmru3nKrjOcuPbMN3z5F8G_96FtSmMfZJ/exec")) return;
      try {
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload)
        });
      } catch (e) {
        console.warn("同步 Sheet 失敗", e);
      }
    }

    // ==================== 讀取資料（遠端優先，localStorage 備援） ====================
    async function loadData() {
      const remote = await fetchRecordsFromSheet();
      if (remote) {
        localStorage.setItem("records", JSON.stringify(remote));
        return remote;
      }
      const data = localStorage.getItem("records");
      return data ? JSON.parse(data) : [];
    }

    // ==================== 儲存新記錄 ====================
    async function saveData(newRecord) {
      const records = await loadData();
      records.push(newRecord);
      localStorage.setItem("records", JSON.stringify(records));
      syncToSheet({ action: "create", record: newRecord });
      await renderList(records);
    }

    // ==================== 渲染卡片列表 ====================
    async function renderList(recordsOverride) {
      const records = recordsOverride || await loadData();
      const container = document.getElementById('cardContainer');
      if (!container) return;

      let filtered = records;
      if (currentFilter !== '全部') {
        filtered = records.filter(r => r.category === currentFilter);
      }

      if (filtered.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center py-10 opacity-50 italic">還沒有任何分享，快來新增吧！</div>`;
        return;
      }

      filtered.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));

      container.innerHTML = filtered.map(record => createCard(record)).join('');
      lucide.createIcons();
    }

    // ==================== 建立卡片 HTML ====================
    function createCard(record) {
      const escapedContent = escapeHtml(record.content || '無內容');
      const escapedCategory = escapeHtml(record.category || '其他');
      const likes = record.likes || 0;
      return `
        <div class="bento-card flex flex-col justify-between ${record.status === 'done' ? 'status-done' : ''}">
          <div>
            <div class="flex justify-between items-start mb-2">
              <span class="bg-bento-yellow text-xs font-bold px-2 py-0.5 rounded-full border border-[#5D4037]">${escapedCategory}</span>
              <span class="text-[10px] opacity-50">${new Date(record.createdAt).toLocaleDateString()}</span>
            </div>
            <p class="font-black text-lg leading-tight line-clamp-2 mb-2">${escapedContent}</p>
          </div>
          <div class="flex justify-between items-center mt-3">
            <button onclick="handleLike('${record.id}')" class="flex items-center gap-1 text-sm font-bold hover:text-red-500 transition">
              <i data-lucide="heart" class="w-4 h-4 ${likes > 0 ? 'fill-red-400 text-red-500' : ''}"></i>
              ${likes}
            </button>
            ${record.status === 'active' ? 
              `<button onclick="markDone('${record.id}')" class="text-[10px] bento-button px-2 py-0.5 bg-white">標記完成</button>` : 
              `<span class="text-[10px] bg-bento-green px-2 py-0.5 rounded-full border border-[#5D4037] font-bold">已處理</span>`
            }
          </div>
        </div>
      `;
    }

    // ==================== Like 功能 ====================
    async function handleLike(id) {
      const records = await loadData();
      const index = records.findIndex(r => r.id === id);
      if (index !== -1) {
        records[index].likes = (records[index].likes || 0) + 1;
        localStorage.setItem("records", JSON.stringify(records));
        syncToSheet({ action: "update", id: id, changes: { likes: records[index].likes } });
        await renderList(records);
      }
    }

    // ==================== 標記完成 ====================
    async function markDone(id) {
      const records = await loadData();
      const index = records.findIndex(r => r.id === id);
      if (index !== -1) {
        records[index].status = 'done';
        localStorage.setItem("records", JSON.stringify(records));
        syncToSheet({ action: "update", id: id, changes: { status: 'done' } });
        await renderList(records);
      }
    }

    // ==================== 設定過濾類別 ====================
    async function setFilter(category) {
      currentFilter = category;
      document.querySelectorAll('#filterBar button').forEach(btn => {
        btn.classList.toggle('bg-bento-primary', btn.dataset.category === category);
      });
      await renderList();
    }

    function selectCategory(category) {
      setFilter(category);
    }

    // ==================== AI 摘要功能（含優化 Prompt） ====================
    async function askAI(userPrompt) {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "askAI", prompt: userPrompt })
      });
      const data = await res.json();
      return data.result || data.error || "AI 冇回應";
    }

    async function handleAISummary() {
      const btn = document.getElementById('aiBtn');
      const text = document.getElementById('aiBtnText');
      if (!btn || !text) return;
      btn.disabled = true;
      text.textContent = '思考中...';
      try {
        const records = await loadData();
        if (records.length === 0) { alert('未有食物資料可以摘要'); return; }
        const summaryInput = records.slice(0, 30).map(r =>
          `[${r.category}] ${r.content}`
        ).join('\n');
        // 優化後的 prompt：更具體、更活潑
        const prompt = `你是一個親切的校園美食顧問。以下是校園美食大搜查中大家分享的美食紀錄。請根據這些資料，用繁體中文總結 3-5 個重點觀察（例如最熱門的類別、常見搭配、季節趨勢等），然後推薦一個你最想嘗試的組合或單品。語氣要活潑熱情，就像跟朋友分享美食心得一樣。\n\n${summaryInput}`;
        const result = await askAI(prompt);
        alert(result);
      } catch (e) {
        alert('AI 出錯：' + e.message);
      } finally {
        btn.disabled = false;
        text.textContent = 'AI 摘要';
      }
    }

    // ==================== Modal 控制 ====================
    function openModal() { document.getElementById('reviewModal').style.display = 'block'; }
    function closeModal() { document.getElementById('reviewModal').style.display = 'none'; }

    // ==================== 表單送出 ====================
    document.getElementById('reviewForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const newRecord = {
        id: Date.now() + "_" + Math.random().toString(36).slice(2, 6),
        createdAt: new Date().toISOString(),
        content: document.getElementById('foodName').value,
        category: document.getElementById('foodCategory').value,
        likes: 0,
        status: "active",
        comment: document.getElementById('foodComment').value
      };
      await saveData(newRecord);
      this.reset();
      closeModal();
    });

    // ==================== 簡單轉義 ====================
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // ==================== 初始化 ====================
    window.onload = async () => {
      await renderList();
      lucide.createIcons();
      const allBtn = document.querySelector('[data-category="全部"]');
      if (allBtn) allBtn.classList.add('bg-bento-primary');
    };
  </script>
</body>
</html>
